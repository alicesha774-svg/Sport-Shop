<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add To Cart With QR</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card{
      background: white;
      width: 320px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      text-align: center;
    }

    .card img{
      width: 100%;
      border-radius: 10px;
    }

    h2{
      margin: 15px 0 10px;
    }

    p{
      color: gray;
      font-size: 14px;
    }

    .price{
      font-size: 22px;
      color: green;
      margin: 10px 0;
      font-weight: bold;
    }

    button{
      background: #ff6600;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover{
      background: #e65c00;
    }

    #cart{
      margin-top: 15px;
      font-weight: bold;
    }

    #qrBox{
      display: none;
      margin-top: 20px;
    }

    #qrBox img{
      width: 180px;
      height: 180px;
    }
  </style>
</head>
<body>

  <div class="card">

    <img src="https://via.placeholder.com/300x200" alt="Product">

    <h2>Gaming Mouse</h2>

    <p>High quality RGB gaming mouse.</p>

    <div class="price">$25</div>

    <button onclick="addToCart()">
      Add To Cart
    </button>

    <div id="cart">
      Cart Items: 0
    </div>

    <div id="qrBox">
      <h3>Scan To Pay</h3>

      <!-- Replace this QR image with your own -->
      <img src="./photo_2026-05-08_13-38-29.jpg" alt="QR Code">
    </div>

  </div>

  <script>
    let count = 0;

    function addToCart(){
      count++;

      document.getElementById("cart").innerHTML =
        "Cart Items: " + count;

      document.getElementById("qrBox").style.display = "block";
    }
  </script>

</body>
</html>
